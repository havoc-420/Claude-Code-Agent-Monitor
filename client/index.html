  <head>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Agent Dashboard" />
    <meta property="og:title" content="Agent Dashboard — Claude Code Monitor" />
    <meta
      property="og:description"
      content="Real-time monitoring platform for Claude Code agent activity. Track sessions, monitor agents, visualize analytics, manage cost tracking, and receive browser notifications — all with live WebSocket updates."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/svg+xml" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Agent Dashboard — Claude Code Monitor" />
    <meta
      name="twitter:description"
      content="Real-time monitoring platform for Claude Code agent activity. Sessions, Kanban board, analytics, cost tracking, browser notifications, and WebSocket push."
    />
    <meta name="twitter:image" content="/og-image.svg" />
    <meta name="twitter:image:alt" content="Agent Dashboard — real-time Claude Code monitoring" />
    <meta name="twitter:creator" content="@hoangsonww" />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Agent Dashboard",
        "description": "Real-time monitoring platform for Claude Code agent activity. Tracks sessions, agents, tool events, token usage analytics, cost tracking, and browser notifications via native hooks with live WebSocket push.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Windows, macOS, Linux",
        "softwareVersion": "1.0.0",
        "license": "https://opensource.org/licenses/MIT",
        "author": {
          "@type": "Person",
          "name": "Son Nguyen Hoang",
          "url": "https://sonnguyenhoang.com"
        },
        "codeRepository": "https://github.com/hoangsonww/Claude-Code-Agent-Monitor",
        "featureList": "Real-time dashboard, Kanban board, Session tracking, Activity feed, Token usage analytics, Cost tracking, Browser notifications, WebSocket live updates, CLI statusline"
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Theme bootstrap: applied synchronously before first paint to avoid
         flashing the wrong palette (dark/light mode *and* accent color). -->
    <script>
      (function () {
        // Must stay in sync with client/src/lib/accent.ts
        var ACCENTS = {
          emerald: {
            dark: { base: "16 185 129", hover: "52 211 153", themeColor: "#10b981" },
            light: { base: "5 150 105", hover: "4 120 87", themeColor: "#059669" },
          },
          teal: {
            dark: { base: "20 184 166", hover: "45 212 191", themeColor: "#14b8a6" },
            light: { base: "13 148 136", hover: "15 118 110", themeColor: "#0d9488" },
          },
          sky: {
            dark: { base: "14 165 233", hover: "56 189 248", themeColor: "#0ea5e9" },
            light: { base: "2 132 199", hover: "3 105 161", themeColor: "#0284c7" },
          },
          indigo: {
            dark: { base: "99 102 241", hover: "129 140 248", themeColor: "#6366f1" },
            light: { base: "79 70 229", hover: "67 56 202", themeColor: "#4f46e5" },
          },
          violet: {
            dark: { base: "139 92 246", hover: "167 139 250", themeColor: "#8b5cf6" },
            light: { base: "124 58 237", hover: "109 40 217", themeColor: "#7c3aed" },
          },
          rose: {
            dark: { base: "244 63 94", hover: "251 113 133", themeColor: "#f43f5e" },
            light: { base: "225 29 72", hover: "190 18 60", themeColor: "#e11d48" },
          },
          amber: {
            dark: { base: "245 158 11", hover: "251 191 36", themeColor: "#f59e0b" },
            light: { base: "217 119 6", hover: "180 83 9", themeColor: "#d97706" },
          },
        };

        try {
          var stored = localStorage.getItem("agent-monitor-theme");
          var theme = stored === "light" ? "light" : "dark";
          var accentId = localStorage.getItem("agent-monitor-accent") || "emerald";
          var preset = ACCENTS[accentId] || ACCENTS.emerald;
          var tone = theme === "light" ? preset.light : preset.dark;

          var root = document.documentElement;
          root.classList.add(theme);
          root.style.colorScheme = theme;
          root.style.setProperty("--accent", tone.base);
          root.style.setProperty("--accent-hover", tone.hover);
          root.style.setProperty("--selection-bg", tone.base);

          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.content = tone.themeColor;
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body class="bg-surface-0 text-gray-200 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
